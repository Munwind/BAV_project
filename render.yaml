services:
  - name: bav-backend
    type: web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./BAV_project/be/Dockerfile
    dockerContext: ./BAV_project/be
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: bav-postgres
          property: connectionString
      - key: AI_SERVICE_HOSTPORT
        fromService:
          name: bav-ai
          type: web
          property: host
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: AUTO_INIT_DB
        value: "true"
      - key: AI_ARTICLE_LIMIT
        value: "10"
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_SEARCH_MAX_RESULTS
        value: "4"
      - key: YOUTUBE_COMMENT_MAX_RESULTS
        value: "20"
      - key: YOUTUBE_LOOKBACK_HOURS
        value: "168"
      - key: ENTITY_EXTRACTION_CONCURRENCY
        value: "4"
      - key: FEED_REQUEST_TIMEOUT_MS
        value: "12000"

  - name: bav-ai
    type: web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./BAV_project/be/Dockerfile.ai
    dockerContext: ./BAV_project/be
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: AI_SERVICE_NAME
        value: sentimentx-ai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: ""
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AI_REASONING_EFFORT
        value: low
      - key: NVIDIA_API_OSS_20b
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_NER_MODEL
        value: openai/gpt-oss-20b
      - key: NVIDIA_NER_MAX_TOKENS
        value: "220"
      - key: NVIDIA_NER_TEMPERATURE
        value: "0"
      - key: NVIDIA_NER_TOP_P
        value: "1"
      - key: NVIDIA_NER_SEED
        value: "7"
      - key: AI_NER_DEBUG_ENABLED
        value: "false"

databases:
  - name: bav-postgres
    plan: basic-256mb
    region: singapore
    databaseName: sentimentx
    ipAllowList: []
